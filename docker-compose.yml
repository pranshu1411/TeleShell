version: "3.8"

services:
  # The Telegram bot (runs in the background)
  telegram:
    build: .
    container_name: teleshell-telegram
    restart: unless-stopped
    env_file:
      - .env
    command: ["bun", "run", "index.ts", "telegram"]
    # Mount the workspace so the agent can read/write files if needed
    volumes:
      - ./:/app

  # The interactive CLI sandbox (run manually via: docker-compose run cli)
  cli:
    build: .
    container_name: teleshell-cli
    env_file:
      - .env
    # We want this to be interactive
    stdin_open: true
    tty: true
    command: ["bun", "run", "index.ts", "wakeup"]
    volumes:
      - ./:/app
